listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;

http_api {
    enabled         on;
    listen          1985;
}

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

vhost __defaultVhost__ {
    hls {
        enabled         on;
        hls_path        ./objs/nginx/html;
        hls_fragment    2;
        hls_window      10;
    }

    http_hooks {
        enabled         on;
        # host.docker.internal resolves to the host machine from within Docker
        # When running all services in Docker, change to: http://api:4000
        on_publish      http://host.docker.internal:4000/api/internal/streams/on-publish;
        on_unpublish    http://host.docker.internal:4000/api/internal/streams/on-unpublish;
    }

    rtc {
        enabled     on;
        bframe      discard;
    }
}

rtc_server {
    enabled     on;
    listen      8000;
    # Use the host's external IP or 'auto' for local dev
    candidate   *;
}
