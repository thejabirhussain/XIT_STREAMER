worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    gzip            on;
    gzip_types      text/plain application/json application/javascript text/css;

    # ─── Rate Limiting ──────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;

    # ─── Upstream: NestJS API ────────────────────────────────────
    upstream api_backend {
        server api:4000;
    }

    # ─── Upstream: Vite Dev Server ───────────────────────────────
    upstream web_frontend {
        server web:3000;
    }

    # ─── Upstream: SRS Media Server ──────────────────────────────
    upstream srs_http {
        server srs:8080;
    }

    # ─── HTTP Server ─────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # API proxy
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        # Socket.IO proxy
        location /socket.io/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # HLS/Media proxy
        location /live/ {
            proxy_pass http://srs_http;
            proxy_set_header Host $host;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }

        # Frontend proxy
        location / {
            proxy_pass http://web_frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }

    # ─── RTMPS Termination (Production) ──────────────────────────
    # Uncomment and configure for production RTMPS support:
    #
    # stream {
    #     upstream srs_rtmp {
    #         server srs:1935;
    #     }
    #
    #     server {
    #         listen 1936 ssl;
    #         ssl_certificate     /etc/ssl/certs/xitstreamer.crt;
    #         ssl_certificate_key /etc/ssl/private/xitstreamer.key;
    #         ssl_protocols       TLSv1.2 TLSv1.3;
    #         proxy_pass          srs_rtmp;
    #     }
    # }
}
