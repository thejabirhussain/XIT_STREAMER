version: '3.9'

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - xit-network

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - xit-network

  srs:
    image: ossrs/srs:5
    volumes:
      - ./infrastructure/srs/srs.conf:/usr/local/srs/conf/srs.conf
    ports:
      - "1935:1935"   # RTMP ingest
      - "1985:1985"   # SRS HTTP API
      - "8080:8080"   # HTTP/HLS server
      - "8000:8000/udp" # WebRTC UDP
    depends_on:
      api:
        condition: service_started
    networks:
      - xit-network

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    env_file: .env
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - xit-network

  media-engine:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.media
    env_file: .env
    ports:
      - "8001:8001"
    depends_on:
      - api
      - srs
    networks:
      - xit-network

  web:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.web
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - xit-network

volumes:
  postgres_data:
  redis_data:

networks:
  xit-network:
    driver: bridge
